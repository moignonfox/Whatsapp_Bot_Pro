<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <title>Vira — Icône app</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#342072"/>
      <stop offset="100%" stop-color="#1e1341"/>
    </linearGradient>
    <linearGradient id="bubbleViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D6BF8"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bubbleAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glowViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Halos lumineux -->
  <circle cx="188" cy="216" r="150" fill="url(#glowViolet)"/>
  <circle cx="336" cy="288" r="150" fill="url(#glowAmber)"/>

  <!-- Bulle violette (Vira qui gère) -->
  <g>
    <rect x="88" y="164" width="204" height="150" rx="42" fill="url(#bubbleViolet)"/>
    <path d="M118 306 L92 358 L182 306 Z" fill="url(#bubbleViolet)"/>
    <circle cx="150" cy="239" r="12" fill="white" opacity="0.95"/>
    <circle cx="190" cy="239" r="12" fill="white" opacity="0.95"/>
    <circle cx="230" cy="239" r="12" fill="white" opacity="0.95"/>
  </g>

  <!-- Bulle ambre (le client qui vend) -->
  <g>
    <rect x="238" y="228" width="186" height="136" rx="38" fill="url(#bubbleAmber)"/>
    <path d="M394 358 L426 402 L344 358 Z" fill="url(#bubbleAmber)"/>
    <path d="M300 295 L331 274 L331 316 Z" fill="#2d1b69" opacity="0.9"/>
  </g>
</svg>
