        </div>
        <span class="logo-text">My<span>Bot</span> SaaS</span>
        <button class="sidebar-close" onclick="document.getElementById('sidebar').classList.remove('open')" aria-label="Fermer le menu">
            <i class="fas fa-times"></i>
        </button>
    </div>

    {# ── Identité Master ── #}
    <div class="sidebar-biz">
        <div class="biz-chip">
            <div class="biz-avatar" style="background: rgba(248,81,73,0.1); border-color: rgba(248,81,73,0.25); color: #F85149;">
                <i class="fas fa-shield-alt"></i>
            </div>
            <div>
                <div class="biz-name">Administration</div>
                <div class="biz-id-label" style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
                    <span style="font-size:9px;font-weight:700;background:rgba(248,81,73,0.10);border:1px solid rgba(248,81,73,0.28);color:#F85149;padding:1px 6px;border-radius:3px;letter-spacing:.4px;">🔐 MASTER</span>
                </div>
            </div>
        </div>
    </div>

    {# ── Navigation principale ── #}
    <nav class="sidebar-nav">
        <div class="nav-section-label">Supervision</div>

        <a class="nav-item {% if active_page == 'dashboard' %}active{% endif %}"
           href="{{ url_for('master.master_dashboard') }}">
            <i class="fas fa-chart-pie"></i> Vue d'ensemble
        </a>

        <div class="nav-section-label">Gestion</div>

        <a class="nav-item {% if active_page == 'create_business' %}active{% endif %}"
           href="{{ url_for('master.view_add_business') }}">
            <i class="fas fa-store-alt"></i> Ajouter un client
        </a>

        <a class="nav-item {% if active_page == 'create_sector' %}active{% endif %}"
           href="{{ url_for('master.view_add_sector') }}">
            <i class="fas fa-tools"></i> Créer un secteur
        </a>
    </nav>

    {# ── Footer ── #}
    <div class="sidebar-footer">
        <a class="nav-item" href="{{ url_for('dashboard.logout') }}">
            <i class="fas fa-sign-out-alt"></i> Quitter Master
        </a>
    </div>

</aside>
