<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte | Vira</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <style>
        .iti { width: 100%; margin-bottom: 5px; }
        .iti__country-list { background-color: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .iti__country.iti__highlight { background-color: var(--surface-hover); }
        .iti__divider { border-bottom: 1px solid var(--border); }
        :root {
            --bg: #0f111a;
            --surface: #1e2130;
            --surface-hover: #2a2d3d;
            --border: #2a2d3d;
            --text: #ffffff;
            --muted: #8b92a5;
            --brand: #5b6af0;
            --brand-hover: #4a56d9;
            --error: #f44336;
            --success: #00e676;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .wizard-container {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .header p {
            color: var(--muted);
            margin: 0;
            font-size: 14px;
        }

        /* Progress Bar */
        .progress-wrapper {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border);
            z-index: 1;
            transform: translateY(-50%);
        }

        .progress-line-fill {
            position: absolute;
            top: 50%;
            left: 0;
            height: 2px;
            background: var(--brand);
            z-index: 2;
            transform: translateY(-50%);
            transition: width 0.4s ease;
            width: 0%;
        }

        .step-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            position: relative;
            z-index: 3;
            transition: all 0.3s;
        }

        .step-dot.active {
            border-color: var(--brand);
            color: var(--brand);
            background: var(--bg);
        }

        .step-dot.completed {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
        }

        /* Forms */
        .step-content {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .step-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(91, 106, 240, 0.2);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* Checkboxes & Radios */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .option-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
        }

        .option-card:hover {
            border-color: var(--brand);
        }

        .option-card.selected {
            border-color: var(--brand);
            background: rgba(91, 106, 240, 0.1);
        }

        .option-card input {
            display: none;
        }

        /* Buttons */
        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--border);
        }

        .btn-primary {
            background: var(--brand);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--brand-hover);
        }

        /* Preview Chat Box */
        .preview-box {
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-top: 15px;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .chat-bubble.client {
            background: var(--surface-hover);
            color: var(--text);
            border-bottom-left-radius: 4px;
            float: left;
            clear: both;
        }

        .chat-bubble.bot {
            background: var(--brand);
            color: #fff;
            border-bottom-right-radius: 4px;
            float: right;
            clear: both;
        }
        
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        
        .error-msg {
            color: var(--error);
            font-size: 13px;
            margin-top: 10px;
            display: none;
            text-align: center;
        }

    </style>
</head>
<body>

<div class="wizard-container">
    <div class="header">
        <h1>Créez votre Bot Vira</h1>
        <p id="step-desc">Étape 1 : Informations de connexion</p>
    </div>

    <div class="progress-wrapper">
        <div class="progress-line"></div>
        <div class="progress-line-fill" id="progress-fill"></div>
        <div class="step-dot active" data-step="1"><i class="fas fa-user"></i></div>
        <div class="step-dot" data-step="2"><i class="fas fa-store"></i></div>
        <div class="step-dot" data-step="3"><i class="fas fa-robot"></i></div>
        <div class="step-dot" data-step="4"><i class="fas fa-check"></i></div>
    </div>

    <!-- Étape 1 : Compte -->
    <div class="step-content active" id="step-1">
        <div class="grid-2">
            <div class="input-group">
                <label>Nom complet (Gérant)</label>
                <input type="text" id="owner_name" placeholder="Ex: Jean Dupont">
            </div>
            <div class="input-group">
                <label>Votre téléphone</label>
                <input type="text" id="owner_phone" placeholder="+228 90 00 00 00">
            </div>
        </div>
        <div class="input-group">
            <label>Adresse Email</label>
            <input type="email" id="email" placeholder="contact@entreprise.com">
        </div>
        <div class="input-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <div class="input-group">
            <label>Numéro WhatsApp dédié au Bot</label>
            <input type="text" id="bot_phone" placeholder="+228 99 00 00 00">
            <span style="font-size:11px; color:var(--muted); margin-top:4px; display:block;">C'est le numéro que vos clients contacteront.</span>
        </div>
    </div>

    <!-- Étape 2 : Identité -->
    <div class="step-content" id="step-2">
        <div class="input-group">
            <label>Nom de l'entreprise</label>
            <input type="text" id="biz_name" placeholder="Ex: Restaurant Chez Kofi">
        </div>
        
        <div class="grid-2">
            <div class="input-group">
                <label>Type d'activité</label>
                <select id="biz_type">
                    <option value="Restaurant / Fast-Food">Restaurant / Fast-Food</option>
                    <option value="Boutique / E-commerce">Boutique / E-commerce</option>
                    <option value="Salon de Beauté / Coiffure">Salon de Beauté / Coiffure</option>
                    <option value="Services">Services (Plombier, etc.)</option>
                    <option value="Clinique / Santé">Clinique / Santé</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>
            <div class="input-group">
                <label>Devise</label>
                <select id="devise">
                    <option value="FCFA">FCFA</option>
                    <option value="EUR">Euro (€)</option>
                    <option value="USD">Dollar ($)</option>
                </select>
            </div>
        </div>
        
        <div class="input-group">
            <label>Ville & Pays</label>
            <input type="text" id="location" placeholder="Ex: Lomé, Togo">
        </div>
    </div>

    <!-- Étape 3 : Configuration Bot -->
    <div class="step-content" id="step-3">
        <div class="input-group">
            <label>Que voulez-vous que votre bot fasse ? (Multi-choix)</label>
            <div class="options-grid">
                <label class="option-card">
                    <input type="checkbox" name="tasks" value="Prendre des commandes et vendre des produits" checked>
                    <i class="fas fa-shopping-cart" style="color:var(--brand)"></i> Vendre / Commander
                </label>
                <label class="option-card">
                    <input type="checkbox" name="tasks" value="Gérer des réservations et des rendez-vous">
                    <i class="fas fa-calendar-alt" style="color:var(--brand)"></i> Réservations
                </label>
                <label class="option-card">
                    <input type="checkbox" name="tasks" value="Répondre aux questions fréquentes (FAQ)" checked>
                    <i class="fas fa-question-circle" style="color:var(--brand)"></i> Support / FAQ
                </label>
                <label class="option-card">
                    <input type="checkbox" name="tasks" value="Proposer des promotions et relancer les clients">
                    <i class="fas fa-bullhorn" style="color:var(--brand)"></i> Promotions
                </label>
            </div>
        </div>

        <div class="input-group">
            <label>Ton de la conversation</label>
            <div class="options-grid">
                <label class="option-card selected">
                    <input type="radio" name="tone" value="Amical, accueillant et tutoiement si possible" checked>
                    Amical & Chaleureux
                </label>
                <label class="option-card">
                    <input type="radio" name="tone" value="Formel, très professionnel et vouvoiement">
                    Formel & Pro
                </label>
            </div>
        </div>

        <div class="input-group">
            <label>Informations importantes pour l'IA (Horaires, règles, spécificités)</label>
            <textarea id="biz_info" rows="3" placeholder="Ex: Ouvert de 8h à 22h. Livraison 1000F. Nous n'acceptons que les paiements à la livraison ou TMoney."></textarea>
        </div>
    </div>

    <!-- Étape 4 : Aperçu -->
    <div class="step-content" id="step-4">
        <div style="text-align:center; margin-bottom:20px;">
            <i class="fas fa-magic" style="font-size:30px; color:var(--brand); margin-bottom:10px;"></i>
            <h3 style="margin:0;">Votre bot est généré !</h3>
            <p style="color:var(--muted); font-size:13px; margin-top:5px;">Voici un aperçu de comment votre Assistant IA s'adressera à vos clients.</p>
        </div>

        <div class="preview-box clearfix">
            <div class="chat-bubble client">Bonjour</div>
            <div class="chat-bubble bot" id="preview-text">
                <!-- Dynamique -->
            </div>
        </div>
        
        <p id="error-alert" class="error-msg"></p>
    </div>

    <div class="actions">
        <button class="btn btn-outline" id="btn-prev" style="display:none;" onclick="prevStep()">Retour</button>
        <button class="btn btn-primary" id="btn-next" onclick="nextStep()" style="margin-left:auto;">Continuer <i class="fas fa-arrow-right" style="margin-left:6px;"></i></button>
        <button class="btn btn-primary" id="btn-submit" style="display:none; margin-left:auto;" onclick="submitForm()">Soumettre ma demande</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
<script>
    let currentStep = 1;
    const totalSteps = 4;
    
    const itiOwner = window.intlTelInput(document.querySelector("#owner_phone"), {
        initialCountry: "tg",
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js",
        separateDialCode: true
    });
    
    const itiBot = window.intlTelInput(document.querySelector("#bot_phone"), {
        initialCountry: "tg",
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js",
        separateDialCode: true
    });
    
    // UI Interactions for options
    document.querySelectorAll('.option-card input[type="checkbox"]').forEach(input => {
        input.addEventListener('change', function() {
            if(this.checked) this.parentElement.classList.add('selected');
            else this.parentElement.classList.remove('selected');
        });
    });

    document.querySelectorAll('.option-card input[type="radio"]').forEach(input => {
        input.addEventListener('change', function() {
            document.querySelectorAll(`input[name="${this.name}"]`).forEach(r => {
                r.parentElement.classList.remove('selected');
            });
            if(this.checked) this.parentElement.classList.add('selected');
        });
    });

    function updateProgress() {
        const fill = document.getElementById('progress-fill');
        const percentage = ((currentStep - 1) / (totalSteps - 1)) * 100;
        fill.style.width = percentage + '%';

        document.querySelectorAll('.step-dot').forEach((dot, index) => {
            const stepNum = index + 1;
            dot.classList.remove('active', 'completed');
            if (stepNum < currentStep) {
                dot.classList.add('completed');
                dot.innerHTML = '<i class="fas fa-check"></i>';
            } else if (stepNum === currentStep) {
                dot.classList.add('active');
                const icons = ['fa-user', 'fa-store', 'fa-robot', 'fa-check'];
                dot.innerHTML = `<i class="fas ${icons[index]}"></i>`;
            } else {
                const icons = ['fa-user', 'fa-store', 'fa-robot', 'fa-check'];
                dot.innerHTML = `<i class="fas ${icons[index]}"></i>`;
            }
        });
        
        const descs = [
            "Étape 1 : Informations de connexion",
            "Étape 2 : Identité du Business",
            "Étape 3 : Configuration de l'Intelligence Artificielle",
            "Étape 4 : Aperçu & Lancement"
        ];
        document.getElementById('step-desc').innerText = descs[currentStep-1];
    }

    function validateStep(step) {
        if (step === 1) {
            if(!document.getElementById('owner_name').value) return false;
            if(!document.getElementById('email').value) return false;
            if(!document.getElementById('password').value) return false;
            if(!document.getElementById('owner_phone').value) return false;
            if(!document.getElementById('bot_phone').value) return false;
        } else if (step === 2) {
            if(!document.getElementById('biz_name').value) return false;
            if(!document.getElementById('location').value) return false;
        }
        return true;
    }

    function generatePreview() {
        const name = document.getElementById('biz_name').value || "Votre entreprise";
        const isFormal = document.querySelector('input[name="tone"]:checked').value.includes('Formel');
        
        let msg = "";
        if(isFormal) {
            msg = `Bonjour ! Bienvenue chez ${name}. Je suis l'assistant virtuel de l'établissement, disponible à toute heure. Que puis-je faire pour vous aujourd'hui ?`;
        } else {
            msg = `Salut ! 👋 Bienvenue chez ${name}. Je suis l'assistant virtuel, là pour t'aider 24h/24. Comment je peux t'aider ? Commande, réservation, infos ?`;
        }
        document.getElementById('preview-text').innerText = msg;
    }

    function showStep(step) {
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById('step-' + step).classList.add('active');
        
        document.getElementById('btn-prev').style.display = step > 1 ? 'block' : 'none';
        
        if (step === totalSteps) {
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-submit').style.display = 'block';
            generatePreview();
        } else {
            document.getElementById('btn-next').style.display = 'block';
            document.getElementById('btn-submit').style.display = 'none';
        }
        
        updateProgress();
    }

    function nextStep() {
        if(!validateStep(currentStep)) {
            alert("Veuillez remplir tous les champs obligatoires avant de continuer.");
            return;
        }
        if (currentStep < totalSteps) {
            currentStep++;
            showStep(currentStep);
        }
    }

    function prevStep() {
        if (currentStep > 1) {
            currentStep--;
            showStep(currentStep);
        }
    }

    async function submitForm() {
        const btn = document.getElementById('btn-submit');
        const err = document.getElementById('error-alert');
        err.style.display = 'none';
        
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Configuration...';
        btn.disabled = true;

        // Collect tasks
        const tasks = [];
        document.querySelectorAll('input[name="tasks"]:checked').forEach(el => tasks.push(el.value));

        const payload = {
            owner_name: document.getElementById('owner_name').value,
            owner_phone: itiOwner.getNumber(),
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            requested_bot_phone: itiBot.getNumber(),
            
            nom: document.getElementById('biz_name').value,
            business_type: document.getElementById('biz_type').value,
            devise: document.getElementById('devise').value,
            ville: document.getElementById('location').value,
            
            bot_tasks: tasks,
            tone: document.querySelector('input[name="tone"]:checked').value,
            business_info: document.getElementById('biz_info').value
        };

        try {
            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            
            if(data.success) {
                document.querySelector('.wizard-container').innerHTML = `
                    <div style="text-align:center; padding: 40px 20px; animation: fadeIn 0.5s ease;">
                        <i class="fas fa-check-circle" style="font-size:60px; color:var(--success); margin-bottom:20px;"></i>
                        <h2 style="margin:0 0 15px 0; color:var(--text);">Demande soumise !</h2>
                        <p style="color:var(--muted); line-height:1.6; font-size:15px; margin-bottom:30px;">
                            Votre bot a été généré et votre demande est en cours d'analyse.<br>
                            Vous pourrez vous connecter dès que l'administrateur aura validé votre accès.
                        </p>
                        <a href="/login" class="btn btn-primary" style="text-decoration:none; display:inline-block;">Retour à la connexion</a>
                    </div>
                `;
            } else {
                err.innerText = data.error || "Erreur lors de l'inscription.";
                err.style.display = 'block';
                btn.innerHTML = 'Soumettre ma demande';
                btn.disabled = false;
            }
        } catch(e) {
            err.innerText = "Erreur de connexion au serveur.";
            err.style.display = 'block';
            btn.innerHTML = 'Soumettre ma demande';
            btn.disabled = false;
        }
    }

</script>

</body>
</html>
